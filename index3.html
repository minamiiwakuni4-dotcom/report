<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>授業報告 V3.6 - Theme & Sticky</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --primary: #4a90e2; --success: #2ecc71; --bg: #f4f7f9; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; }
        
        /* ダッシュボード用 */
        .card-done { background-color: #f3f4f6; opacity: 0.6; border-left: 8px solid #10b981; }
        .card-active { border-left: 8px solid #3b82f6; background-color: white; }
        
        /* ボタン基本スタイル */
        .choice-btn { flex: 1; min-width: 60px; padding: 12px 2px; border: 2px solid #ddd; border-radius: 12px; background: white; cursor: pointer; font-size: 0.75rem; font-weight: 800; transition: 0.2s; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .choice-btn span { font-size: 1.2rem; }
        .choice-btn.active { border-color: #3b82f6; background: white; color: #3b82f6; transform: translateY(-2px); shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        
        /* 評価ボタン */
        .eval-good.active { background: #2ecc71; color: white; border: none; }
        .eval-normal.active { background: #f1c40f; color: white; border: none; }
        .eval-effort.active { background: #e74c3c; color: white; border: none; }
        
        /* 背景パターン（透かし） */
        .theme-wrapper { transition: all 0.5s ease; background-repeat: repeat; background-size: 120px; background-attachment: fixed; }
        
        /* 英語: ABC */
        .pattern-英語 { background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='10' y='40' fill='%23ef4444' opacity='0.04' font-family='Arial' font-weight='bold' font-size='16'%3EABC%3C/text%3E%3C/svg%3E"); }
        /* 数学: +-×÷ */
        .pattern-数学 { background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='10' y='40' fill='%233b82f6' opacity='0.04' font-family='Arial' font-weight='bold' font-size='20'%3E+−×÷%3C/text%3E%3C/svg%3E"); }
        /* 国語: あいう */
        .pattern-国語 { background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='10' y='40' fill='%2392400e' opacity='0.04' font-family='Arial' font-weight='bold' font-size='16'%3Eあいう%3C/text%3E%3C/svg%3E"); }
        /* 理科: 原子と試験管 */
        .pattern-理科 { background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='10' y='40' fill='%2310b981' opacity='0.04' font-family='Arial' font-size='20'%3E⚛🧪%3C/text%3E%3C/svg%3E"); }
        /* 社会: 地球儀 */
        .pattern-社会 { background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='10' y='40' fill='%23f43f5e' opacity='0.04' font-family='Arial' font-size='20'%3E🌍📜%3C/text%3E%3C/svg%3E"); }

        .preview-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
        .preview-item { position: relative; aspect-ratio: 3/4; background: #ddd; border-radius: 4px; overflow: hidden; }
        .preview-item img { width: 100%; height: 100%; object-fit: cover; }
        .del-btn { position: absolute; top: 2px; right: 2px; background: rgba(0,0,0,0.6); color: white; border: none; border-radius: 50%; width: 22px; height: 22px; }
    </style>
</head>
<body class="pb-20">

    <div id="dashboardView">
        <header class="bg-white shadow-sm p-4 sticky top-0 z-10 text-center">
            <h1 class="text-lg font-bold text-slate-700">授業報告システム V3.6</h1>
            <div class="flex gap-2 mt-3">
                <input type="text" id="studentSearch" oninput="searchStudent()" placeholder="生徒名で検索..." class="flex-1 border rounded-lg px-3 py-2 text-sm shadow-sm outline-none focus:ring-2 focus:ring-blue-400">
                <button onclick="loadData()" class="bg-blue-500 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-md">🔄 更新</button>
            </div>
        </header>

        <div id="settings" class="m-4 p-4 bg-orange-50 border border-orange-200 rounded-lg text-sm">
            <span class="font-bold text-orange-800">🔑 APIキー設定</span>
            <input type="password" id="apiKeyInput" class="w-full mt-2 p-2 border rounded" placeholder="AIza...">
            <button onclick="saveKey()" class="w-full mt-2 bg-slate-500 text-white p-2 rounded font-bold">キーを保存</button>
        </div>

        <main id="cardContainer" class="p-4 grid grid-cols-1 gap-4">
            <div class="text-center py-10 text-gray-500">データを読み込み中...</div>
        </main>
    </div>

    <div id="reportView" class="hidden fixed inset-0 bg-white z-20 overflow-y-auto">
        <div id="themeWrapper" class="theme-wrapper min-h-screen pb-32">
            
            <header class="sticky top-0 z-[100] bg-white/90 backdrop-blur-md border-b shadow-sm p-4">
                <div class="flex justify-between items-start mb-4">
                    <button onclick="backToDashboard()" class="text-slate-500 font-bold bg-slate-100 px-4 py-2 rounded-xl text-sm">＜ 戻る</button>
                    <div class="text-right">
                        <div id="viewStudentName" class="text-xl font-black text-slate-800 leading-none"></div>
                        <div id="viewSubInfo" class="text-[10px] text-slate-500 mt-1"></div>
                    </div>
                </div>
                
                <div class="flex gap-1" id="subjectGroup">
                    <button class="choice-btn active" onclick="changeSubject('英語', this)"><span>📕</span>英語</button>
                    <button class="choice-btn" onclick="changeSubject('数学', this)"><span>📘</span>数学</button>
                    <button class="choice-btn" onclick="changeSubject('国語', this)"><span>📚</span>国語</button>
                    <button class="choice-btn" onclick="changeSubject('理科', this)"><span>🧪</span>理科</button>
                    <button class="choice-btn" onclick="changeSubject('社会', this)"><span>🌍</span>社会</button>
                </div>
            </header>
            
            <div class="p-4 space-y-6">
                <div id="evaluationContainer" class="bg-white/70 backdrop-blur-sm p-4 rounded-2xl border border-white shadow-sm"></div>

                <div class="bg-white/80 border-2 border-dashed border-blue-300 rounded-2xl p-6 text-center shadow-sm">
                    <button onclick="document.getElementById('cameraInput').click()" class="bg-blue-600 text-white w-full py-5 rounded-2xl font-black shadow-lg active:scale-95 transition text-lg flex items-center justify-center gap-2">
                        <span>📷</span> ノートを撮影 (連写)
                    </button>
                    <input type="file" id="cameraInput" accept="image/*" capture="environment" multiple style="display:none" onchange="handleFiles(this.files)">
                    <div class="preview-grid" id="previewGrid"></div>
                </div>

                <div id="aiSection" class="space-y-4">
                    <div class="flex justify-between items-center px-1">
                        <span class="text-sm font-bold text-slate-600">AI作成の報告文</span>
                        <button onclick="copyText()" class="text-xs bg-slate-500 text-white px-4 py-1.5 rounded-full font-bold">コピー</button>
                    </div>
                    <div id="loading" class="hidden text-center text-blue-600 font-bold animate-pulse py-2">🚀 AIが分析中...</div>
                    <textarea id="output" class="w-full h-56 p-4 border-2 border-white bg-white/70 rounded-3xl text-sm focus:border-blue-400 outline-none shadow-sm" placeholder="ここに文章が生成されます"></textarea>
                    
                    <div class="px-1 text-center">
                        <span class="text-[10px] text-slate-400 block mb-2 font-bold uppercase tracking-widest">Merged Image Preview</span>
                        <img id="mergedImagePreview" class="hidden w-full max-w-sm mx-auto rounded-2xl border-4 border-white shadow-xl">
                    </div>
                </div>
            </div>
        </div>

        <div class="fixed bottom-0 left-0 right-0 p-4 bg-white/80 backdrop-blur-md border-t flex gap-4 z-[110]">
            <button id="generateBtn" onclick="runAI()" class="flex-1 bg-emerald-500 text-white py-4 rounded-2xl text-lg font-black shadow-xl active:bg-emerald-600 transition">AI報告作成</button>
            <button id="saveBtn" onclick="saveToSheet()" class="hidden flex-1 bg-blue-600 text-white py-4 rounded-2xl text-lg font-black shadow-xl active:bg-blue-700 transition">シートに保存</button>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbw5nrIhB1VGihn7vomC6zKG7ViBXxRJQ_0aSrTX_3HdU4u9D-0CuHinX8XhA5tu3KqSsw/exec";
        let scheduleData = [];
        let doneList = JSON.parse(localStorage.getItem('doneListV3') || "[]");
        let photoList = [];
        let selectedSubject = '英語';
        let currentEvals = {};
        const subjectConfig = {
            '英語': ['集中度', '理解度', '文法理解', '語彙力'],
            '数学': ['集中度', '理解度', '計算力', '記述力'],
            '理科': ['集中度', '理解度', '用語公式暗記', '記述力'],
            '社会': ['集中度', '理解度', '用語暗記', '記述力'],
            '国語': ['集中度', '理解度', '内容把握', '記述力']
        };

        const subjectThemes = {
            '英語': 'bg-red-50',
            '数学': 'bg-blue-50',
            '国語': 'bg-amber-50',
            '理科': 'bg-emerald-50',
            '社会': 'bg-rose-50'
        };

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const keyFromUrl = urlParams.get('key');
            if (keyFromUrl && keyFromUrl.startsWith('AIza')) {
                localStorage.setItem('GEMINI_API_KEY', keyFromUrl);
                window.history.replaceState({}, document.title, window.location.pathname);
                alert('APIキーを自動設定しました！');
            }
            const savedKey = localStorage.getItem('GEMINI_API_KEY');
            if (savedKey) document.getElementById('settings').style.display = 'none';
            loadData();
        };

        function saveKey() {
            const key = document.getElementById('apiKeyInput').value;
            if (key.startsWith('AIza')) {
                localStorage.setItem('GEMINI_API_KEY', key);
                document.getElementById('settings').style.display = 'none';
                alert('保存完了！');
            } else { alert('正しいキーを入力してください。'); }
        }

        async function loadData() {
            const container = document.getElementById('cardContainer');
            container.innerHTML = '<div class="text-center py-10">最新の座席表を取得中...</div>';
            try {
                const res = await fetch(GAS_URL);
                const data = await res.json();
                scheduleData = data.schedule;
                renderCards(scheduleData);
            } catch (e) {
                container.innerHTML = '<div class="text-red-500 text-center py-10">読み込み失敗。更新ボタンを押してください。</div>';
            }
        }

        function renderCards(list) {
            const container = document.getElementById('cardContainer');
            container.innerHTML = "";

            const komaOrder = { 'Z': 0, 'A': 1, 'B': 2, 'C': 3, 'D': 4 };
            const sortedList = [...list].sort((a, b) => {
                const orderA = komaOrder[a.koma] ?? 99;
                const orderB = komaOrder[b.koma] ?? 99;
                if (orderA !== orderB) return orderA - orderB;
                return a.teacher.localeCompare(b.teacher, 'ja');
            });

            const komaStyles = {
                'Z': 'bg-purple-50 border-purple-100',
                'A': 'bg-blue-50 border-blue-100',
                'B': 'bg-emerald-50 border-emerald-100',
                'C': 'bg-orange-50 border-orange-100'
            };

            let currentKoma = "";
            let currentTeacher = "";
            let komaSection = null;
            let teacherBlock = null;
            let studentGrid = null;

            sortedList.forEach(item => {
                if (item.koma !== currentKoma) {
                    currentKoma = item.koma;
                    currentTeacher = ""; 
                    komaSection = document.createElement('div');
                    komaSection.className = `col-span-full mb-10 p-5 rounded-[2rem] border-2 ${komaStyles[currentKoma] || 'bg-gray-50'}`;
                    const header = document.createElement('h2');
                    header.className = "text-xl font-black text-slate-700 mb-6 flex items-center";
                    header.innerHTML = `<span class="bg-white px-5 py-1.5 rounded-full shadow-sm border border-slate-200">${currentKoma}コマ</span>`;
                    komaSection.appendChild(header);
                    container.appendChild(komaSection);
                }

                if (item.teacher !== currentTeacher) {
                    currentTeacher = item.teacher;
                    teacherBlock = document.createElement('div');
                    teacherBlock.className = "mb-8 last:mb-2";
                    const tHeader = document.createElement('h3');
                    tHeader.className = "text-2xl font-black text-slate-800 ml-1 mb-3 flex items-center tracking-tight";
                    tHeader.innerHTML = `<span class="w-2 h-6 bg-blue-600 rounded-full mr-3"></span>${currentTeacher} <span class="text-sm font-bold text-slate-500 ml-2">先生</span>`;
                    teacherBlock.appendChild(tHeader);
                    studentGrid = document.createElement('div');
                    studentGrid.className = "grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3";
                    teacherBlock.appendChild(studentGrid);
                    komaSection.appendChild(teacherBlock);
                }

                const isDone = item.isDoneServer || doneList.includes(item.student + item.teacher + item.koma);
                const card = document.createElement('div');
                card.className = `p-3 rounded-2xl border-2 transition active:scale-95 cursor-pointer flex items-center justify-center min-h-[80px] relative ${
                    isDone ? 'bg-emerald-50/50 border-emerald-400 opacity-60' : 'bg-white border-white shadow-md hover:border-blue-300'
                }`;
                card.onclick = () => openReport(item);
                card.innerHTML = `<div class="text-lg font-bold text-slate-800 text-center leading-tight">${item.student}</div>
                    ${isDone ? '<span class="absolute bottom-2 right-2 text-[9px] bg-emerald-500 text-white px-2 py-0.5 rounded-full font-black shadow-sm">済</span>' : ''}`;
                studentGrid.appendChild(card);
            });
        }

        function searchStudent() {
            const term = document.getElementById('studentSearch').value.toLowerCase();
            const filtered = scheduleData.filter(i => i.student.toLowerCase().includes(term));
            renderCards(filtered);
        }

        function openReport(item) {
            const isDone = item.isDoneServer || doneList.includes(item.student + item.teacher + item.koma);
            if (isDone) {
                if (!confirm("⚠️ この生徒は報告済みです。修正（上書き）しますか？")) return;
            }

            window.activeReportData = item;
            document.getElementById('viewStudentName').innerText = item.student;
            document.getElementById('viewSubInfo').innerText = `${item.teacher} 先生 / ${item.koma}コマ`;
            photoList = [];
            document.getElementById('previewGrid').innerHTML = '';
            document.getElementById('output').value = '';
            document.getElementById('mergedImagePreview').classList.add('hidden');
            document.getElementById('saveBtn').classList.add('hidden');
            
            // デフォルト教科を適用
            changeSubject('英語', document.querySelector('#subjectGroup button'));
            
            document.getElementById('dashboardView').classList.add('hidden');
            document.getElementById('reportView').classList.remove('hidden');
            window.scrollTo(0,0);
        }

        function changeSubject(subject, btn) {
            selectedSubject = subject;
            document.querySelectorAll('#subjectGroup .choice-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            // テーマ切り替え
            const wrapper = document.getElementById('themeWrapper');
            // 全パターンのクラスを一旦消す
            Object.keys(subjectThemes).forEach(s => {
                wrapper.classList.remove(subjectThemes[s]);
                wrapper.classList.remove(`pattern-${s}`);
            });
            // 新しいテーマを適用
            wrapper.classList.add(subjectThemes[subject]);
            wrapper.classList.add(`pattern-${subject}`);
            
            renderEvaluationRows(subject);
        }

        function backToDashboard() {
            document.getElementById('dashboardView').classList.remove('hidden');
            document.getElementById('reportView').classList.add('hidden');
            renderCards(scheduleData);
        }

        function renderEvaluationRows(subject) {
            const container = document.getElementById('evaluationContainer');
            container.innerHTML = '';
            currentEvals = {};
            subjectConfig[subject].forEach(item => {
                currentEvals[item] = '良い';
                const row = document.createElement('div');
                row.className = 'mb-4 last:mb-0';
                row.innerHTML = `<span class="text-xs font-black text-slate-500 block mb-2 uppercase tracking-wider">${item}</span>
                    <div class="flex gap-2">
                        <button class="choice-btn eval-good active" onclick="setEval('${item}', '良い', this)">良い</button>
                        <button class="choice-btn eval-normal" onclick="setEval('${item}', '普通', this)">普通</button>
                        <button class="choice-btn eval-effort" onclick="setEval('${item}', '要努力', this)">努力</button>
                    </div>`;
                container.appendChild(row);
            });
        }

        function setEval(item, value, btn) {
            currentEvals[item] = value;
            btn.parentElement.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function handleFiles(files) {
            for (let file of files) {
                const reader = new FileReader();
                reader.onload = (e) => { photoList.push(e.target.result); renderPreviews(); };
                reader.readAsDataURL(file);
            }
        }

        function renderPreviews() {
            const grid = document.getElementById('previewGrid'); grid.innerHTML = '';
            photoList.forEach((src, index) => {
                const div = document.createElement('div');
                div.className = 'preview-item';
                div.innerHTML = `<img src="${src}"><button class="del-btn" onclick="removePhoto(${index})">✕</button>`;
                grid.appendChild(div);
            });
        }
        function removePhoto(index) { photoList.splice(index, 1); renderPreviews(); }

        async function runAI() {
            const apiKey = localStorage.getItem('GEMINI_API_KEY');
            if (!apiKey) { alert("APIキーを設定してください"); return; }
            if (photoList.length === 0) { alert("写真を撮ってください"); return; }

            const loading = document.getElementById('loading');
            const output = document.getElementById('output');
            const genBtn = document.getElementById('generateBtn');
            
            loading.classList.remove('hidden');
            genBtn.disabled = true;
            output.value = "AI分析中...";

            try {
                await mergeImages();
                let evalText = Object.entries(currentEvals).map(([k, v]) => `${k}:${v}`).join(', ');
                const prompt = `あなたは塾講師です。以下の情報を元に、保護者への授業報告書を作成してください。
                    教科: ${selectedSubject}, 評価: ${evalText}。
                    【制約事項】
                    1. 挨拶や定型文は絶対に含めない。本文のみを250〜300字程度で作成。
                    2. ノートの写真を分析した具体的な気づきを含める。
                    3. 親しみやすくもプロフェッショナルな口調で。`;

                const imageParts = photoList.map(dataUrl => ({
                    inlineData: { data: dataUrl.split(',')[1], mimeType: "image/jpeg" }
                }));

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, ...imageParts] }] })
                });

                const data = await response.json();
                output.value = data.candidates[0].content.parts[0].text;
                document.getElementById('saveBtn').classList.remove('hidden');
           // --- 修正後：原因を画面に出す ---
} catch (e) {
    console.error(e); // ブラウザのログに詳細を出す
    output.value = "エラー詳細: " + e.message; 
    alert("エラーが発生しました: " + e); // iPadでも原因が見えるように
} finally {
                loading.classList.add('hidden');
                genBtn.disabled = false;
            }
        }

        async function mergeImages() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const images = await Promise.all(photoList.map(src => {
                return new Promise(resolve => {
                    const img = new Image();
                    img.onload = () => resolve(img);
                    img.src = src;
                });
            }));
            const targetWidth = 1000;
            let totalHeight = 0;
            const resized = images.map(img => {
                const h = (targetWidth / img.width) * img.height;
                totalHeight += h;
                return { img, h };
            });
            canvas.width = targetWidth;
            canvas.height = totalHeight;
            let currentY = 0;
            resized.forEach(item => { ctx.drawImage(item.img, 0, currentY, targetWidth, item.h); currentY += item.h; });
            const resultImg = document.getElementById('mergedImagePreview');
            resultImg.src = canvas.toDataURL('image/jpeg', 0.8);
            resultImg.classList.remove('hidden');
        }

        async function saveToSheet(isForce = false) {
            const saveBtn = document.getElementById('saveBtn');
            const mergedImg = document.getElementById('mergedImagePreview');
            const forceFlag = (isForce === true);
            
            saveBtn.innerText = "保存中...";
            saveBtn.disabled = true;

            const payload = {
                student: window.activeReportData.student,
                teacher: window.activeReportData.teacher,
                koma: window.activeReportData.koma,
                subject: selectedSubject,
                aiText: document.getElementById('output').value,
                imageData: mergedImg.src,
                force: forceFlag 
            };

            try {
                const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify(payload) });
                const result = await res.json();
                
                if (result.result === "exists") {
                    if (confirm("⚠️ 既に報告書が保存されています。上書きしてよろしいですか？")) {
                        saveToSheet(true);
                    }
                } else if (result.result === "success") {
                    doneList.push(payload.student + payload.teacher + payload.koma);
                    localStorage.setItem('doneListV3', JSON.stringify(doneList));
                    alert("保存完了しました。");
                    backToDashboard();
                }
            } catch (e) {
                alert("送信エラーが発生しました。");
            } finally {
                saveBtn.innerText = "シートに保存";
                saveBtn.disabled = false;
            }
        }
        function copyText() {
            const out = document.getElementById('output');
            out.select();
            navigator.clipboard.writeText(out.value);
            alert("コピーしました");
        }
    </script>
</body>
</html>
